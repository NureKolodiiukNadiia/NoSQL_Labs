<div class="section">
  <h2>Bookings</h2>

  <div class="card">
    <h3>Booking CRUD</h3>
    <div class="form-group">
      <button (click)="loadBookings()">Load Bookings</button>
      <button (click)="updateSelectedBooking()" [disabled]="!selectedBooking">Update Selected</button>
      <button (click)="deleteSelectedBooking()" [disabled]="!selectedBooking">Delete Selected</button>
    </div>
    <ag-grid-angular
      class="ag-theme-quartz"
      style="width: 100%; height: 300px;"
      [rowData]="bookings()"
      [columnDefs]="bookingColumnDefs"
      [rowSelection]="'single'"
      (selectionChanged)="onSelectBooking($event)">
    </ag-grid-angular>
  </div>

  <div class="card">
    <h3>Create Booking</h3>
    <div class="form-group">
      <input [(ngModel)]="userId" placeholder="User ID" />
      <input [(ngModel)]="workspaceId" placeholder="Workspace ID" />
      <select [(ngModel)]="status">
        <option value="">Select Status</option>
        <option value="0">New</option>
        <option value="1">Confirmed</option>
        <option value="2">Cancelled</option>
        <option value="3">Completed</option>
      </select>
      <input type="date" [(ngModel)]="startTime" placeholder="Start Time" />
      <input type="date" [(ngModel)]="endTime" placeholder="End Time" />
      <input [(ngModel)]="totalAmount" placeholder="Total Amount">
      <button (click)="createBooking()">Create Booking</button>
    </div>
    @if (bookingMessage()) { <p class="message">{{ bookingMessage() }}</p> }
  </div>

  <div class="card">
    <h3>Get User Booking Counts</h3>
    <button (click)="getBookingCounts()">Get All Counts</button>
    @if (bookingCounts().length > 0) {
      <div class="result">
        <table>
          <thead>
          <tr>
            <th>Email</th>
            <th>Bookings Count</th>
          </tr>
          </thead>
          <tbody>
            @for (bc of bookingCounts(); track bc.email) {
              <tr>
                <td>{{ bc.email }}</td>
                <td>{{ bc.bookingsCount }}</td>
              </tr>
            }
          </tbody>
        </table>
      </div>
    }
  </div>
</div>
